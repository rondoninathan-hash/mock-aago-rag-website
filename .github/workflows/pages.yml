name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Grant the workflow token the permissions needed to enable and deploy Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # enablement: true turns GitHub Pages on automatically (build type:
      # GitHub Actions), so no manual toggle in repo Settings is required.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Publish the whole repo root: index.html, articles/, data/.
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
